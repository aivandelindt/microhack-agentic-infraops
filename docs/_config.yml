title: "Agentic InfraOps MicroHack"
description: >-
  6-hour hands-on microhack: Design, deploy, and present Azure
  infrastructure using AI agents and GitHub Copilot
baseurl: "/microhack-agentic-infraops"
url: "https://jonathan-vella.github.io"

theme: just-the-docs

# Color scheme — switch to "custom" after adding _sass/custom/custom.scss in A3
color_scheme: light

# Site branding
logo: "/assets/images/logo.svg"
favicon_ico: "/assets/images/favicon.ico"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# UI features
enable_copy_code_button: true
heading_anchors: true
nav_sort: case_insensitive

# Mermaid diagrams
mermaid:
  version: "10.6.0"

# Callouts
callouts:
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue
  important:
    title: Important
    color: green
  tip:
    title: Tip
    color: purple
  time:
    title: Time Check
    color: red

# External links
aux_links:
  "View on GitHub":
    - "https://github.com/jonathan-vella/microhack-agentic-infraops"
aux_links_new_tab: true

# Edit on GitHub
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/jonathan-vella/microhack-agentic-infraops"
gh_edit_source: docs
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

# Footer
footer_content: "&copy; 2025 Jonathan Vella. Distributed under the <a href=\"https://github.com/jonathan-vella/microhack-agentic-infraops/blob/main/LICENSE\">MIT License</a>."

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links

# Kramdown
kramdown:
  parse_block_html: false

# Build exclusions
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - .gitignore
  - node_modules
  - vendor
