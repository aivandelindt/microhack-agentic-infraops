StylesPath = .vale/styles
MinAlertLevel = suggestion

Packages = Microsoft

Vocab = InfraOps

[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = Vale, Microsoft

# Reduce noise from technical content
Microsoft.FirstPerson = NO
Microsoft.We = NO
Microsoft.Passive = NO
Microsoft.Adverbs = NO
Microsoft.Contractions = NO
Microsoft.Auto = NO
Microsoft.Foreign = NO
# Em-dash with spaces is used throughout; this is intentional style.
Microsoft.Dashes = NO
# American-style punctuation-inside-quotes enforcement off for technical prose.
Microsoft.Quotes = NO
# Brand term 'MicroHack' conflicts with Vale.Terms lowercase preference.
Vale.Terms = NO
# A-Z word list flags common developer terms like 'backend'.
Microsoft.Avoid = NO

# Frontmatter handling (Starlight/Astro)
BlockIgnores = (?s){% *raw *%}.*?{% *endraw *%}, \
  (?s)^---.*?^---$, \
  (?s)<!--markdownlint-disable.*?-->, \
  (?s):::\w+(\[[^\]]*\])?\n.*?:::

TokenIgnores = (?s)`.*?`, \
  (?s)\$\$.*?\$\$, \
  (?s)\$.*?\$, \
  (\[[^\]]+\]\([^)]+\)), \
  (`[^`]+`)
